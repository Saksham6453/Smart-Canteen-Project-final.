<!DOCTYPE html>
<html>
<head>
    <title>K.R. Mangalam Smart Canteen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-box card text-center" style="margin-top: 15vh;">
        <h2 style="color: var(--primary); margin-bottom: 25px;">🍔 KRM Smart Canteen</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="error-msg">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required style="width: 100%; box-sizing: border-box;">
            <input type="password" name="password" placeholder="Password" required style="width: 100%; box-sizing: border-box;">
            <button type="submit" style="width: 100%; margin-top: 10px;">Login</button>
        </form>
        
        <p style="color: var(--text-muted); font-size: 0.85em; margin-top: 25px;">
            Demo: student / pass | admin / admin
        </p>
    </div>
</body>
</html>
